<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BU CSE Batch-13 — Ballistic-15</title>
<meta name="description" content="Home for the CSE Batch-13 (Ballistic-15) community at University of Barishal — notes, resources, projects and the batch roster.">
<meta name="theme-color" content="#223466">

<!-- Set theme before first paint to avoid a flash of the wrong theme -->
<script src="data/site-data.js"></script>
<script>
(function(){
  try{
    var saved = localStorage.getItem('bu-cse-theme');
    var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  }catch(e){}
})();
</script>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23223466'/%3E%3Ctext x='50' y='68' font-size='54' font-family='monospace' fill='%23F2C572' text-anchor='middle'%3E13%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Bengali:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>

<style>
  :root{
    --ink:#1B1D29; --muted:#6B6F7A; --paper:#FAFAF7; --surface:#FFFFFF; --line:#E4E2DC;
    --navy:#223466; --navy-deep:#17284D; --accent-solid:#223466; --amber-soft:#C98A2B;
    --mono-bg:#141A2E; --mono-text:#D7DBE8; --mono-key:#8FB4FF; --mono-str:#F2C572; --mono-num:#7FD1A8;
    --success:#3C8B5B; --danger:#C24545;
    --toast-bg:#1B1D29; --toast-text:#FAFAF7;
    --radius:10px; --shadow:0 1px 2px rgba(20,20,30,.04), 0 8px 24px rgba(20,20,30,.06);
    --overlay:rgba(15,17,26,.55);
  }
  :root[data-theme="dark"]{
    --ink:#E7E9F0; --muted:#8D93A8; --paper:#0F1320; --surface:#161B2C; --line:#262C42;
    --navy:#8FADFF; --navy-deep:#A9C0FF; --accent-solid:#3A54A6; --amber-soft:#F2C572;
    --mono-bg:#0B0E19; --mono-text:#D7DBE8;
    --success:#5FBE86; --danger:#E37272;
    --toast-bg:#2A3049; --toast-text:#E7E9F0;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 28px rgba(0,0,0,.4);
    --overlay:rgba(0,0,0,.65);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
  }

  body{
    font-family:'Inter', 'Noto Sans Bengali', sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.6;
    -webkit-font-smoothing:antialiased;
    transition:background .2s, color .2s;
  }

  .mono{ font-family:'IBM Plex Mono', monospace; }
  .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
  a{ color:inherit; }
  :focus-visible{ outline:2px solid var(--navy); outline-offset:2px; border-radius:4px; }
  button{ font-family:inherit; background:none; border:none; cursor:pointer; color:inherit; }
  kbd{
    font-family:'IBM Plex Mono', monospace; font-size:.72rem; background:var(--paper);
    border:1px solid var(--line); border-bottom-width:2px; border-radius:5px; padding:2px 6px; color:var(--muted);
  }

  .skip-link{
    position:absolute; left:12px; top:-48px; background:var(--accent-solid); color:#fff; padding:10px 16px;
    border-radius:8px; z-index:2000; font-size:.85rem; transition:top .15s;
  }
  .skip-link:focus{ top:12px; }

  #progressBar{
    position:fixed; top:0; left:0; height:2px; background:var(--accent-solid); z-index:1200; width:0%;
    transition:width .1s ease-out;
  }

  /* ===== NAV ===== */
  nav{ background:var(--surface); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:1000; }
  .nav-container{ max-width:1180px; margin:0 auto; padding:14px 24px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .nav-logo{ display:flex; align-items:center; gap:10px; font-weight:600; font-size:1rem; }
  .nav-logo .mark{ width:30px; height:30px; border-radius:7px; background:var(--accent-solid); color:var(--amber-soft); font-family:'IBM Plex Mono', monospace; font-weight:700; font-size:.8rem; display:flex; align-items:center; justify-content:center; }
  .nav-logo .tag{ color:var(--muted); font-size:.78rem; font-family:'IBM Plex Mono', monospace; margin-left:2px; }

  .nav-mid{ display:flex; gap:6px; list-style:none; align-items:center; }
  .nav-mid button{ color:var(--muted); font-size:.87rem; font-weight:500; padding:8px 12px; border-radius:7px; transition:color .15s, background .15s; white-space:nowrap; }
  .nav-mid button:hover{ color:var(--ink); background:var(--paper); }
  .nav-mid button.active{ color:var(--navy); font-weight:600; }

  .nav-right{ display:flex; align-items:center; gap:6px; }
  .icon-btn{
    width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center;
    color:var(--muted); transition:background .15s, color .15s; font-size:.95rem; flex-shrink:0;
  }
  .icon-btn:hover{ background:var(--paper); color:var(--ink); }

  .search-trigger{
    display:flex; align-items:center; gap:8px; border:1px solid var(--line); border-radius:8px;
    padding:7px 10px; color:var(--muted); font-size:.83rem; background:var(--paper);
  }
  .search-trigger:hover{ border-color:var(--navy); color:var(--ink); }

  .hamburger{ display:none; font-size:1.1rem; }

  /* ===== HERO ===== */
  .hero{ max-width:1180px; margin:0 auto; padding:64px 24px 56px; display:grid; grid-template-columns:1.1fr 1fr; gap:56px; align-items:center; position:relative; overflow:hidden; }
  .hero::before{ content:''; position:absolute; width:440px; height:440px; right:-220px; top:-220px; border-radius:50%; background:radial-gradient(circle, rgba(143,180,255,.20), transparent 68%); pointer-events:none; }
  .hero-eyebrow{ font-family:'IBM Plex Mono', monospace; font-size:.78rem; letter-spacing:.08em; color:var(--navy); text-transform:uppercase; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .hero-eyebrow .dot{ width:6px; height:6px; border-radius:50%; background:var(--success); display:inline-block; }
  .hero h1{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:2.7rem; line-height:1.08; letter-spacing:-.01em; }
  .hero h1 .accent{ color:var(--navy); }
  .hero p.lede{ margin-top:16px; color:var(--muted); font-size:1.02rem; max-width:46ch; }
  .hero-stats{ display:flex; gap:28px; margin-top:28px; }
  .stat .n{ font-size:1.3rem; font-weight:600; font-family:'IBM Plex Mono', monospace; }
  .stat .l{ font-size:.75rem; color:var(--muted); font-family:'IBM Plex Mono', monospace; }
  .hero-cta{ margin-top:26px; display:flex; gap:10px; flex-wrap:wrap; }
  .btn{ display:inline-flex; align-items:center; gap:8px; padding:10px 16px; border-radius:8px; font-size:.87rem; font-weight:500; transition:all .15s; }
  .btn-primary{ background:var(--accent-solid); color:#fff; }
  .btn-primary:hover{ background:var(--navy-deep); }
  .btn-ghost{ border:1px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--navy); }

  .manifest{ background:var(--mono-bg); border:1px solid rgba(255,255,255,.08); border-radius:14px; overflow:hidden; box-shadow:var(--shadow); position:relative; }
  .manifest::after{ content:''; position:absolute; inset:0; pointer-events:none; background:linear-gradient(120deg, transparent 45%, rgba(255,255,255,.04), transparent 55%); }
  .manifest-bar{ display:flex; align-items:center; gap:8px; padding:12px 16px; border-bottom:1px solid rgba(255,255,255,.08); }
  .manifest-bar .dots{ display:flex; gap:6px; }
  .manifest-bar .dots span{ width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.18); }
  .manifest-bar .fname{ font-family:'IBM Plex Mono', monospace; font-size:.76rem; color:rgba(255,255,255,.5); margin-left:6px; }
  .manifest pre{ font-family:'IBM Plex Mono', monospace; font-size:.86rem; line-height:1.9; padding:20px 22px; color:var(--mono-text); overflow-x:auto; }
  .manifest .k{ color:var(--mono-key); } .manifest .s{ color:var(--mono-str); } .manifest .num{ color:var(--mono-num); } .manifest .p{ color:rgba(255,255,255,.35); }
  .semester-card{ padding:22px; color:var(--mono-text); }
  .semester-card .overline{ font-family:'IBM Plex Mono',monospace; font-size:.72rem; color:var(--mono-key); letter-spacing:.08em; text-transform:uppercase; }
  .semester-card h2{ font-family:'Space Grotesk',sans-serif; font-size:1.45rem; margin:7px 0 5px; color:#fff; }
  .semester-card > p{ color:rgba(255,255,255,.62); font-size:.85rem; }
  .semester-metrics{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:20px 0; }
  .semester-metric{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); border-radius:8px; padding:10px; }
  .semester-metric strong{ display:block; color:var(--mono-str); font-family:'IBM Plex Mono',monospace; font-size:1.08rem; }
  .semester-metric span{ color:rgba(255,255,255,.5); font-size:.69rem; }
  .semester-next{ padding:11px 12px; border-radius:8px; background:rgba(127,209,168,.10); border:1px solid rgba(127,209,168,.22); font-size:.8rem; color:#C6EAD7; }

  @media (max-width:860px){ .hero{ grid-template-columns:1fr; padding-top:36px; gap:32px; } .hero h1{ font-size:2.1rem; } .insight-strip{ grid-template-columns:repeat(2,1fr); margin-top:0; } }
  @media (max-width:480px){ .manifest pre{ font-size:.76rem; padding:16px 18px; } .insight-strip{ grid-template-columns:1fr 1fr; padding:0 16px; }.semester-metrics{ grid-template-columns:1fr; } }

  /* ===== SECTION SHELL ===== */
  .section{ max-width:1180px; margin:0 auto; padding:52px 24px; scroll-margin-top:70px; }
  .section + .section{ border-top:1px solid var(--line); }
  .section-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:28px; gap:16px; flex-wrap:wrap; }
  .section-head h2{ font-family:'Space Grotesk', sans-serif; font-size:1.4rem; font-weight:600; }
  .section-head .count{ font-family:'IBM Plex Mono', monospace; font-size:.8rem; color:var(--muted); }

  /* ===== QUICK LINK CARDS ===== */
  .cards-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(240px,1fr)); gap:14px; }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:20px; text-align:left; display:flex; gap:14px; align-items:flex-start; transition:border-color .15s, transform .15s; text-decoration:none; width:100%; }
  .card:hover{ border-color:var(--navy); transform:translateY(-2px); }
  .card i{ font-size:1.05rem; color:var(--navy); margin-top:2px; width:20px; text-align:center; }
  .card h3{ font-size:.98rem; font-weight:600; margin-bottom:4px; }
  .card p{ font-size:.84rem; color:var(--muted); }
  .insight-strip{ max-width:1132px; margin:-12px auto 0; padding:0 24px; display:grid; grid-template-columns:repeat(4,1fr); gap:10px; position:relative; z-index:2; }
  .insight-stat{ background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:13px 15px; box-shadow:var(--shadow); }
  .insight-stat .label{ display:flex; align-items:center; gap:7px; color:var(--muted); font-size:.75rem; }
  .insight-stat .label i{ color:var(--navy); }.insight-stat strong{ display:block; font-family:'Space Grotesk',sans-serif; font-size:1.2rem; margin-top:5px; }.insight-stat span{ color:var(--muted); font-size:.76rem; }

  /* ===== TIMELINE ===== */
  .timeline{ position:relative; padding-left:26px; }
  .timeline::before{ content:''; position:absolute; left:5px; top:6px; bottom:6px; width:1px; background:var(--line); }
  .tl-item{ position:relative; padding-bottom:26px; }
  .tl-item:last-child{ padding-bottom:0; }
  .tl-item::before{ content:''; position:absolute; left:-26px; top:5px; width:9px; height:9px; border-radius:50%; background:var(--surface); border:2px solid var(--navy); }
  .tl-date{ font-family:'IBM Plex Mono', monospace; font-size:.76rem; color:var(--muted); margin-bottom:4px; }
  .tl-item h3{ font-size:.98rem; font-weight:600; margin-bottom:4px; }
  .tl-item p{ font-size:.9rem; color:var(--muted); max-width:60ch; }
  .tl-meta{ display:flex; gap:8px; align-items:center; margin-bottom:5px; flex-wrap:wrap; }
  .badge{ font-family:'IBM Plex Mono',monospace; font-size:.67rem; letter-spacing:.03em; padding:2px 6px; border:1px solid var(--line); border-radius:999px; color:var(--muted); }
  .badge.important{ color:var(--danger); border-color:var(--danger); }
  .update-link{ color:var(--navy); font-size:.82rem; font-weight:600; display:inline-block; margin-top:7px; }

  /* ===== STUDENT DASHBOARD ===== */
  .insight-grid{ display:grid; grid-template-columns:1.25fr .75fr; gap:18px; }
  .panel{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:20px; }
  .panel h3{ font-family:'Space Grotesk',sans-serif; font-size:1rem; margin-bottom:8px; }
  .panel p{ color:var(--muted); font-size:.87rem; }
  .course-list{ display:grid; grid-template-columns:repeat(auto-fit,minmax(215px,1fr)); gap:12px; margin-top:18px; }
  .course-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; text-align:left; width:100%; transition:border-color .15s,transform .15s; }
  .course-card:hover{ border-color:var(--navy); transform:translateY(-2px); }
  .course-card.active{ border-color:var(--navy); box-shadow:0 0 0 3px color-mix(in srgb, var(--navy) 13%, transparent); }
  .course-card .course-code{ color:var(--navy); font-family:'IBM Plex Mono',monospace; font-size:.75rem; }
  .course-card h3{ font-size:.93rem; line-height:1.35; margin:6px 0; }
  .course-card p{ font-size:.8rem; color:var(--muted); }
  .course-card .credit{ font-family:'IBM Plex Mono',monospace; font-size:.72rem; color:var(--muted); margin-top:10px; }
  .planner-form{ display:flex; gap:8px; margin:14px 0; }
  .planner-form input{ min-width:0; flex:1; border:1px solid var(--line); border-radius:7px; background:var(--paper); color:var(--ink); padding:8px 10px; font:inherit; font-size:.84rem; }
  .planner-form button{ padding:8px 11px; border-radius:7px; background:var(--accent-solid); color:#fff; font-size:.82rem; }
  .task-list{ list-style:none; display:grid; gap:6px; }
  .task-list li{ display:flex; align-items:center; gap:8px; font-size:.84rem; padding:5px 0; }
  .task-list li.done span{ color:var(--muted); text-decoration:line-through; }
  .task-list .remove-task{ margin-left:auto; color:var(--muted); padding:4px; }
  .resource-filter{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
  .filter-btn{ border:1px solid var(--line); border-radius:999px; padding:6px 10px; font-size:.8rem; color:var(--muted); }
  .filter-btn.active,.filter-btn:hover{ border-color:var(--navy); color:var(--navy); }
  .resource-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(235px,1fr)); gap:12px; }
  .resource-card{ position:relative; display:block; text-decoration:none; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px 46px 16px 16px; transition:transform .15s,border-color .15s; }
  .resource-card:hover{ transform:translateY(-2px); border-color:var(--navy); }
  .resource-card h3{ font-size:.94rem; margin:7px 0 4px; }.resource-card p{ font-size:.82rem; color:var(--muted); }
  .resource-card .resource-meta{ font-family:'IBM Plex Mono',monospace; font-size:.7rem; color:var(--navy); }
  .resource-card-wrap{ position:relative; }.save-resource{ position:absolute; right:9px; top:9px; width:30px; height:30px; border:1px solid var(--line); border-radius:7px; background:var(--surface); color:var(--muted); z-index:1; }.save-resource:hover,.save-resource.saved{ color:var(--amber-soft); border-color:var(--amber-soft); }.save-resource.saved i{ font-weight:900; }
  .empty-state{ padding:22px 0; color:var(--muted); font-size:.9rem; }
  .course-detail{ margin-top:14px; padding:14px; border-left:3px solid var(--navy); background:var(--paper); border-radius:0 8px 8px 0; font-size:.86rem; }
  .course-detail p{ margin-top:5px; }
  .course-note{ margin-top:14px; padding-top:12px; border-top:1px solid var(--line); }.course-note label{ display:flex; justify-content:space-between; gap:10px; font-weight:600; font-size:.82rem; }.course-note small{ color:var(--muted); font-weight:400; }.course-note textarea{ width:100%; min-height:72px; resize:vertical; margin-top:7px; padding:9px 10px; border:1px solid var(--line); border-radius:7px; background:var(--surface); color:var(--ink); font:inherit; font-size:.82rem; }
  .progress-panel{ margin-top:18px; background:linear-gradient(135deg,var(--surface),var(--paper)); border:1px solid var(--line); border-radius:var(--radius); padding:18px; }
  .progress-head{ display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }.progress-head h3{ margin:0; }.progress-head strong{ color:var(--navy); font-family:'IBM Plex Mono',monospace; }
  .progress-track{ height:8px; overflow:hidden; border-radius:99px; background:var(--line); margin:12px 0 16px; }.progress-track span{ display:block; height:100%; width:0; background:linear-gradient(90deg,var(--accent-solid),var(--amber-soft)); transition:width .25s ease; }
  .course-checklist{ display:grid; grid-template-columns:repeat(auto-fit,minmax(185px,1fr)); gap:7px; list-style:none; }.course-checklist label{ display:flex; gap:8px; align-items:center; padding:8px 9px; border:1px solid var(--line); border-radius:7px; font-size:.79rem; cursor:pointer; background:var(--surface); }.course-checklist label:has(input:checked){ border-color:var(--success); }.course-checklist input{ accent-color:var(--success); }
  .progress-details summary{ cursor:pointer; color:var(--navy); font-size:.83rem; font-weight:600; list-style:none; }.progress-details summary::-webkit-details-marker{ display:none; }.progress-details summary::after{ content:'Show courses'; margin-left:8px; color:var(--muted); font-weight:400; }.progress-details[open] summary::after{ content:'Hide courses'; }.progress-details .course-checklist{ margin-top:12px; }
  .student-pulse{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }.pulse-item{ padding:10px 12px; background:var(--paper); border-radius:8px; border:1px solid var(--line); }.pulse-item span{ display:block; color:var(--muted); font-size:.71rem; }.pulse-item strong{ display:block; font-size:.84rem; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .focus-timer{ margin-top:16px; border:1px solid var(--line); border-radius:9px; padding:12px; background:linear-gradient(135deg,var(--paper),var(--surface)); }.focus-timer-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; }.focus-timer-head h4{ font-family:'Space Grotesk',sans-serif; font-size:.88rem; }.focus-timer select{ font:inherit; font-size:.75rem; padding:5px 7px; color:var(--ink); border:1px solid var(--line); border-radius:6px; background:var(--surface); }.timer-display{ font-family:'IBM Plex Mono',monospace; font-size:1.65rem; font-weight:600; letter-spacing:.04em; margin:10px 0; }.timer-actions{ display:flex; gap:7px; }.timer-actions button{ flex:1; border:1px solid var(--line); border-radius:6px; padding:7px; font-size:.78rem; }.timer-actions .timer-primary{ background:var(--accent-solid); border-color:var(--accent-solid); color:#fff; }
  .syllabus-search{ display:flex; align-items:center; gap:9px; padding:9px 11px; border:1px solid var(--line); border-radius:8px; margin:18px 0; background:var(--paper); }.syllabus-search i{ color:var(--muted); }.syllabus-search input{ width:100%; border:0; outline:0; background:transparent; font:inherit; color:var(--ink); }
  .syllabus-hidden{ display:none !important; }

  /* ===== PARTICIPANTS ===== */
  .toolbar{ display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .search-box{ flex:1; min-width:200px; max-width:320px; display:flex; align-items:center; gap:8px; border:1px solid var(--line); border-radius:8px; padding:8px 12px; background:var(--surface); }
  .search-box i{ color:var(--muted); font-size:.85rem; }
  .search-box input{ border:none; outline:none; font-family:inherit; font-size:.88rem; width:100%; background:transparent; color:var(--ink); }
  .tool-btn{ display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:.83rem; color:var(--muted); transition:border-color .15s, color .15s; }
  .tool-btn:hover{ border-color:var(--navy); color:var(--ink); }
  .table-container{ border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; background:var(--surface); }
  table{ width:100%; border-collapse:collapse; }
  th{ background:var(--paper); color:var(--muted); padding:10px 18px; text-align:left; font-size:.72rem; font-family:'IBM Plex Mono', monospace; letter-spacing:.06em; text-transform:uppercase; border-bottom:1px solid var(--line); }
  th button{ display:flex; align-items:center; gap:6px; color:inherit; font:inherit; text-transform:inherit; letter-spacing:inherit; transition:color .15s; }
  th button:hover{ color:var(--navy); }
  td{ padding:11px 18px; border-bottom:1px solid var(--line); font-size:.92rem; }
  tbody tr:last-child td{ border-bottom:none; }
  tbody tr:hover td{ background:var(--paper); }
  .serial-no{ font-family:'IBM Plex Mono', monospace; color:var(--muted); width:44px; }
  .no-results{ padding:24px 18px; color:var(--muted); font-size:.9rem; text-align:center; }

  /* ===== MARKDOWN PAGE VIEW ===== */
  .page-toolbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; gap:12px; flex-wrap:wrap; }
  .breadcrumb{ font-size:.8rem; color:var(--muted); font-family:'IBM Plex Mono', monospace; }
  .breadcrumb span{ color:var(--ink); }
  .markdown-content{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:34px 40px; line-height:1.8; }
  .markdown-content h1{ font-family:'Space Grotesk',sans-serif; font-size:1.7rem; margin:0 0 14px; }
  .markdown-content h2{ font-family:'Space Grotesk',sans-serif; color:var(--navy); font-size:1.3rem; margin:22px 0 10px; border-bottom:1px solid var(--line); padding-bottom:8px; }
  .markdown-content h3{ font-size:1.05rem; margin:16px 0 8px; }
  .markdown-content p{ margin:10px 0; }
  .markdown-content ul, .markdown-content ol{ margin:10px 0 10px 22px; }
  .markdown-content a{ color:var(--navy); text-decoration:underline; text-underline-offset:2px; }
  .markdown-content code{ font-family:'IBM Plex Mono',monospace; background:var(--paper); padding:2px 6px; border-radius:4px; font-size:.86rem; }
  .markdown-content pre{ background:var(--mono-bg); color:var(--mono-text); padding:16px 20px; border-radius:8px; overflow-x:auto; margin:14px 0; }
  .markdown-content pre code{ background:none; color:inherit; padding:0; }
  .markdown-content table{ width:100%; border-collapse:collapse; margin:14px 0; }
  .markdown-content th{ background:var(--accent-solid); color:#fff; padding:9px 14px; text-transform:none; letter-spacing:0; font-family:'Inter',sans-serif; font-size:.85rem; }
  .markdown-content td{ padding:9px 14px; }
  .markdown-content blockquote{ border-left:3px solid var(--navy); padding:8px 18px; margin:14px 0; background:var(--paper); color:var(--muted); }
  .markdown-content img{ max-width:100%; border-radius:8px; margin:10px 0; }
  .txt-block{ white-space:pre-wrap; font-family:'IBM Plex Mono', monospace; font-size:.88rem; background:var(--mono-bg); color:var(--mono-text); padding:22px 24px; border-radius:8px; line-height:1.8; }

  .loading{ text-align:center; padding:60px 20px; color:var(--muted); }
  .loading i{ font-size:1.4rem; animation:spin 1s linear infinite; }
  @keyframes spin{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }

  .back-btn{ display:inline-flex; align-items:center; gap:8px; padding:8px 14px; background:var(--surface); border:1px solid var(--line); border-radius:8px; font-size:.86rem; font-weight:500; transition:border-color .15s; }
  .back-btn:hover{ border-color:var(--navy); }

  /* ===== COMMAND PALETTE ===== */
  .cmdk-overlay{ position:fixed; inset:0; background:var(--overlay); z-index:1500; display:none; align-items:flex-start; justify-content:center; padding:12vh 20px 20px; }
  .cmdk-overlay.open{ display:flex; }
  .cmdk-panel{ width:100%; max-width:560px; background:var(--surface); border:1px solid var(--line); border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,.3); overflow:hidden; }
  .cmdk-input-row{ display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--line); }
  .cmdk-input-row i{ color:var(--muted); }
  .cmdk-input-row input{ flex:1; border:none; outline:none; background:transparent; font-family:inherit; font-size:.95rem; color:var(--ink); }
  .cmdk-input-row kbd{ font-size:.7rem; }
  .cmdk-list{ max-height:360px; overflow-y:auto; padding:8px; }
  .cmdk-group-label{ font-family:'IBM Plex Mono', monospace; font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; padding:10px 10px 4px; }
  .cmdk-item{ display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:8px; font-size:.88rem; cursor:pointer; }
  .cmdk-item i{ color:var(--muted); width:16px; text-align:center; }
  .cmdk-item.selected{ background:var(--paper); }
  .cmdk-item .hint{ margin-left:auto; font-size:.72rem; color:var(--muted); font-family:'IBM Plex Mono', monospace; }
  .cmdk-empty{ padding:24px; text-align:center; color:var(--muted); font-size:.88rem; }

  /* ===== TOASTS ===== */
  .toast-stack{ position:fixed; top:16px; right:16px; z-index:2000; display:flex; flex-direction:column; gap:8px; }
  .toast{ background:var(--toast-bg); color:var(--toast-text); padding:10px 16px; border-radius:8px; font-size:.85rem; box-shadow:var(--shadow); display:flex; align-items:center; gap:8px; animation:toastIn .18s ease-out; }
  @keyframes toastIn{ from{ opacity:0; transform:translateY(-6px);} to{ opacity:1; transform:translateY(0);} }

  /* ===== BACK TO TOP ===== */
  .to-top{ position:fixed; right:20px; bottom:20px; width:42px; height:42px; border-radius:50%; background:var(--accent-solid); color:#fff; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:900; }
  .to-top.visible{ opacity:1; pointer-events:auto; }
  .to-top:hover{ transform:translateY(-2px); }

  /* ===== FOOTER ===== */
  footer{ border-top:1px solid var(--line); padding:36px 24px; }
  .footer-inner{ max-width:1180px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; }
  .footer-links{ display:flex; gap:22px; list-style:none; flex-wrap:wrap; }
  .footer-links button{ color:var(--muted); font-size:.85rem; }
  .footer-links button:hover{ color:var(--ink); }
  .social-icons{ display:flex; gap:16px; }
  .social-icons a{ color:var(--muted); font-size:1.05rem; transition:color .15s; }
  .social-icons a:hover{ color:var(--navy); }
  footer .fine{ font-size:.78rem; color:var(--muted); margin-top:14px; text-align:center; }

  @media print{
    nav, footer, .hero, #quick-links, #announcements, .toolbar, .to-top, .toast-stack, #progressBar{ display:none !important; }
    body{ background:#fff; color:#000; }
  }

  @media (max-width:980px){
    .nav-mid{ display:none; flex-direction:column; align-items:stretch; position:absolute; top:100%; left:0; right:0; background:var(--surface); border-bottom:1px solid var(--line); padding:8px; gap:2px; }
    .nav-mid.active{ display:flex; }
    .nav-mid button{ text-align:left; width:100%; }
    .hamburger{ display:block; }
    .search-trigger{ padding:0; width:36px; height:36px; justify-content:center; border:none; background:transparent; }
    .search-trigger span, .search-trigger kbd{ display:none; }
    .section-head{ flex-direction:column; align-items:flex-start; }
    .markdown-content{ padding:22px; }
  }
  @media (max-width:680px){
    .insight-grid{ grid-template-columns:1fr; }

    .section{ padding:38px 16px; }
    .course-list{ grid-template-columns:1fr; }
    .resource-grid{ grid-template-columns:1fr; }
  }
</style>

  let focusTimerInterval = null;
  function stopFocusTimer(){ if (focusTimerInterval){ clearInterval(focusTimerInterval); focusTimerInterval = null; } document.title = "BU CSE Batch-13 — Ballistic-15"; }
  function wireFocusTimer(){
    stopFocusTimer();
    const display = document.getElementById("timerDisplay"); const duration = document.getElementById("timerDuration"); const start = document.getElementById("timerStart"); const reset = document.getElementById("timerReset");
    if (!display || !duration || !start || !reset) return;
    let secondsLeft = Number(duration.value) * 60; let isRunning = false;
    function draw(){ const mins = Math.floor(secondsLeft / 60); const secs = secondsLeft % 60; display.textContent = `${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`; document.title = isRunning ? `${display.textContent} · Focus | BU CSE Batch-13` : "BU CSE Batch-13 — Ballistic-15"; }
    function pause(){ stopFocusTimer(); isRunning = false; start.textContent = "Resume"; duration.disabled = false; draw(); }
    start.addEventListener("click", () => {
      if (isRunning){ pause(); return; }
      isRunning = true; start.textContent = "Pause"; duration.disabled = true; draw();
      focusTimerInterval = setInterval(() => { secondsLeft -= 1; if (secondsLeft <= 0){ secondsLeft = 0; stopFocusTimer(); isRunning = false; start.textContent = "Start again"; duration.disabled = false; draw(); toast("Focus session complete — take a short break.", "fa-circle-check"); return; } draw(); }, 1000);
    });
    reset.addEventListener("click", () => { stopFocusTimer(); isRunning = false; secondsLeft = Number(duration.value) * 60; start.textContent = "Start"; duration.disabled = false; draw(); });
    duration.addEventListener("change", () => { if (!isRunning){ secondsLeft = Number(duration.value) * 60; draw(); } });
    draw();
  }

  function getSortedRoster(){
    const indexed = participants.map((name, i) => ({ name, roll: i + 1 }));
    if (rosterSortMode === "az") indexed.sort((a,b) => a.name.localeCompare(b.name));

  function renderRoster(filter){
    const tbody = document.getElementById("participantTableBody");
    const countEl = document.getElementById("rosterCount");
    if (!tbody) return;
    const q = (filter || "").trim().toLowerCase();
    const list = getSortedRoster();
    const filtered = q ? list.filter(p => p.name.toLowerCase().includes(q)) : list;

    if (countEl) countEl.textContent = q ? `${filtered.length} of ${participants.length}` : `${participants.length} members`;

    if (filtered.length === 0){
      tbody.innerHTML = `<tr><td colspan="2" class="no-results">No name matches "${escapeHtml(filter)}".</td></tr>`;
      return;

    tbody.innerHTML = filtered.map(p => `

    `).join("");

  function downloadCsv(){
    const rows = [["Roll", "Name"], ...getSortedRoster().map(p => [p.roll, p.name])];
    const csv = rows.map(r => r.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "bu-cse-batch13-roster.csv";
    document.body.appendChild(a); a.click(); a.remove();

  async function renderPage(route){
    mainEl.innerHTML = `<div class="section"><div class="loading"><i class="fas fa-spinner"></i><p style="margin-top:12px">Loading ${escapeHtml(route.label)}…</p></div></div>`;
    progressBar.style.width = "30%";

    try{
      if (location.protocol === "file:"){
        throw new Error("This page is open as a local file, so the browser blocks fetching other files (CORS). Serve the folder with a local server (e.g. `npx serve`) or via GitHub Pages instead.");
      }
      const response = await fetch(route.file);
      progressBar.style.width = "70%";
      if (!response.ok) throw new Error(`File not found (HTTP ${response.status})`);
      const text = await response.text();
      const htmlContent = route.file.endsWith(".md") ? marked.parse(text) : `<div class="txt-block">${escapeHtml(text)}</div>`;

      mainEl.innerHTML = `
        <div class="section">
          <div class="page-toolbar">

              <span class="breadcrumb">Home / <span>${escapeHtml(route.label)}</span></span>
              <button class="tool-btn" id="copyLinkBtn"><i class="fas fa-link"></i> Copy link</button>
            </div>
          </div>
          <div class="markdown-content">${htmlContent}</div>
        </div>
      `;
      document.getElementById("backBtn").addEventListener("click", () => navigate(""));
      document.getElementById("copyLinkBtn").addEventListener("click", async () => {
        try{ await navigator.clipboard.writeText(location.href); toast("Link copied to clipboard", "fa-link"); }
        catch(e){ toast("Couldn't copy — copy the URL manually", "fa-triangle-exclamation"); }
      });
      progressBar.style.width = "100%";
      setTimeout(() => progressBar.style.width = "0%", 300);
      window.scrollTo({ top: 0, behavior: "smooth" });

    }catch(error){
      mainEl.innerHTML = `
        <div class="section">
          <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Back to home</button>
          <div class="markdown-content" style="margin-top:18px">

          </div>

      document.getElementById("backBtn").addEventListener("click", () => navigate(""));
      progressBar.style.width = "0%";

  /* ---------- Routing: clean slugs, e.g. #/resources, #/participants ---------- */
  function slugToHash(slug){ return slug ? `#/${slug}` : "#/"; }
  function currentSlug(){ return (location.hash || "#/").replace(/^#\/?/, ""); }

  function render(){
    const slug = currentSlug();
    const route = routes[slug] || routes[""];
    if (route.type !== "home" && route.type !== "scroll") stopFocusTimer();
    setActiveNav(route.navId);

    if (route.type === "home"){
      renderHome();
    } else if (route.type === "scroll"){
      if (!document.getElementById("home")) renderHome();
      scrollToSection(route.target);
    } else if (route.type === "updates") {
      renderUpdatesPage();
    } else if (route.type === "resources") {
      renderResourcesPage();
    } else if (route.type === "syllabus") {
      renderSyllabusPage();
    } else {
      renderPage(route);
    }
  }

  // Use this everywhere instead of touching location.hash directly, so a click on
  // the already-active route still re-runs render() (e.g. re-scrolling to Participants).
  function navigate(slug){
    const target = slugToHash(slug);
    if (location.hash === target) render();
    else location.hash = target;
  }

  window.addEventListener("hashchange", render);

  /* ---------- Click delegation ---------- */
  document.addEventListener("click", (e) => {
    const el = e.target.closest("[data-route]");
    if (el){ closeMobileMenu(); navigate(el.getAttribute("data-route")); return; }
    if (e.target.closest("#navHomeBtn")){ closeMobileMenu(); navigate(""); return; }
  });

  /* ---------- Command palette ---------- */
  const overlay = document.getElementById("cmdkOverlay");
  const cmdkInput = document.getElementById("cmdkInput");
  const cmdkList = document.getElementById("cmdkList");
  let cmdkItems = [];
  let cmdkSelected = 0;
  let lastFocused = null;

  const pageRouteList = Object.keys(routes)
    .filter(slug => slug !== "")
    .map(slug => ({ slug, ...routes[slug] }));

  function rank(name, q){
    const lower = name.toLowerCase();
    if (lower === q) return 0;
    if (lower.startsWith(q)) return 1;
    return 2;
  }

  function buildCmdkItems(query){
    const q = query.trim().toLowerCase();
    const pageMatches = pageRouteList
      .filter(p => !q || p.label.toLowerCase().includes(q))
      .sort((a,b) => rank(a.label, q) - rank(b.label, q))
      .map(p => ({ type:"route", slug:p.slug, label:p.label, icon:p.icon }));

    let nameMatches = [];
    if (q){
      nameMatches = participants
        .map((name, i) => ({ name, roll: i+1 }))
        .filter(p => p.name.toLowerCase().includes(q) || String(p.roll).padStart(2,"0").startsWith(q))
        .sort((a,b) => rank(a.name, q) - rank(b.name, q))
        .slice(0, 8)
        .map(p => ({ type:"person", label:p.name, roll:p.roll }));
    }
    return { pageMatches, nameMatches };
  }

  function renderCmdk(query){
    const { pageMatches, nameMatches } = buildCmdkItems(query);
    cmdkItems = [...pageMatches, ...nameMatches];
    cmdkSelected = 0;

    if (cmdkItems.length === 0){
      cmdkList.innerHTML = `<div class="cmdk-empty">No matches for "${escapeHtml(query)}"</div>`;
      return;
    }
    let html = "";
    if (pageMatches.length){
      html += `<div class="cmdk-group-label">Pages</div>`;
      pageMatches.forEach((p, i) => { html += `<div class="cmdk-item" data-index="${i}"><i class="fas ${p.icon}"></i><span>${escapeHtml(p.label)}</span><span class="hint">Go to</span></div>`; });
    }
    if (nameMatches.length){
      html += `<div class="cmdk-group-label">Roster</div>`;
      nameMatches.forEach((p, i) => { html += `<div class="cmdk-item" data-index="${pageMatches.length + i}"><i class="fas fa-user"></i><span>${escapeHtml(p.label)}</span><span class="hint">#${String(p.roll).padStart(2,"0")}</span></div>`; });
    }
    cmdkList.innerHTML = html;
    highlightCmdk();
  }

  function highlightCmdk(){
    cmdkList.querySelectorAll(".cmdk-item").forEach(el => {
      el.classList.toggle("selected", Number(el.getAttribute("data-index")) === cmdkSelected);
    });
    const sel = cmdkList.querySelector(".cmdk-item.selected");
    if (sel) sel.scrollIntoView({ block: "nearest" });
  }

  function activateCmdkItem(item){
    if (!item) return;
    if (item.type === "route"){ closeCmdk(); navigate(item.slug); }
    else if (item.type === "person"){
      closeCmdk(); navigate("participants");
      setTimeout(() => { const input = document.getElementById("participantSearch"); if (input){ input.value = item.label; renderRoster(item.label); } }, 250);
    }
  }

  function openCmdk(){
    lastFocused = document.activeElement;
    overlay.classList.add("open");
    cmdkInput.value = "";
    renderCmdk("");
    setTimeout(() => cmdkInput.focus(), 10);
  }
  function closeCmdk(){
    overlay.classList.remove("open");
    if (lastFocused && lastFocused.focus) lastFocused.focus();
  }

  document.getElementById("openSearchNav").addEventListener("click", openCmdk);
  overlay.addEventListener("click", (e) => { if (e.target === overlay) closeCmdk(); });
  cmdkInput.addEventListener("input", (e) => renderCmdk(e.target.value));
  cmdkList.addEventListener("click", (e) => {
    const item = e.target.closest(".cmdk-item");
    if (item) activateCmdkItem(cmdkItems[Number(item.getAttribute("data-index"))]);
  });

  document.addEventListener("keydown", (e) => {
    const isMac = navigator.platform.toUpperCase().includes("MAC");
    const modifier = isMac ? e.metaKey : e.ctrlKey;
    if (modifier && e.key.toLowerCase() === "k"){ e.preventDefault(); overlay.classList.contains("open") ? closeCmdk() : openCmdk(); return; }
    if (!overlay.classList.contains("open")) return;
    if (e.key === "Escape"){ closeCmdk(); return; }
    if (e.key === "ArrowDown"){ e.preventDefault(); cmdkSelected = Math.min(cmdkSelected + 1, cmdkItems.length - 1); highlightCmdk(); return; }
    if (e.key === "ArrowUp"){ e.preventDefault(); cmdkSelected = Math.max(cmdkSelected - 1, 0); highlightCmdk(); return; }
    if (e.key === "Enter"){ e.preventDefault(); activateCmdkItem(cmdkItems[cmdkSelected]); return; }
  });

  /* ---------- Back-to-top ---------- */
  window.addEventListener("scroll", () => { toTopBtn.classList.toggle("visible", window.scrollY > 480); }, { passive: true });
  toTopBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

  /* ---------- Init ---------- */
  document.addEventListener("DOMContentLoaded", render);
})();
</script>

</body>
</html>
